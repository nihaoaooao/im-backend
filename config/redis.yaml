# =====================================================
# 壹信 IM Redis 配置文件
# =====================================================

redis:
  # Redis 连接配置
  host: localhost
  port: 6379
  password: ""
  db: 0

  # 连接池配置（支持高并发）
  pool_size: 100          # 连接池大小
  min_idle_conns: 10     # 最小空闲连接数

  # 超时配置
  dial_timeout: 5          # 连接超时（秒）
  read_timeout: 3          # 读超时（秒）
  write_timeout: 3         # 写超时（秒）
  pool_timeout: 10         # 连接池超时（秒）

# =====================================================
# Redis 数据结构设计
# =====================================================

# 1. 用户连接列表
# Key: user:{uid}:connections
# Type: Set
# Value: 连接ID集合
# 说明: 存储用户的所有WebSocket连接ID

# 2. 未读消息计数
# Key: user:{uid}:unread
# Type: Hash
# Field: conversation_id
# Value: 未读消息数量
# 示例: HSET user:1:unread 100 5  (会话100有5条未读)

# 3. 消息队列
# Key: message:queue
# Type: Stream
# 说明: 实时消息投递队列

# 4. 离线消息队列
# Key: message:offline:{uid}
# Type: List
# 说明: 存储离线消息

# 5. 群组成员缓存
# Key: group:{gid}:members
# Type: Set
# Value: 成员ID集合

# 6. 在线用户列表
# Key: online:users
# Type: Set
# Value: 在线用户ID集合

# 7. Token 黑名单
# Key: token:blacklist:{token}
# Type: String
# Value: 1
# TTL: Token剩余有效时间

# 8. 会话信息缓存
# Key: conversation:{id}:info
# Type: String (JSON)
# TTL: 3600秒（1小时）
# 说明: 缓存会话基本信息

# 9. 用户信息缓存
# Key: user:{uid}:profile
# Type: String (JSON)
# TTL: 1800秒（30分钟）
# 说明: 缓存用户基本信息

# 10. 验证码缓存
# Key: verifycode:{phone}
# Type: String
# Value: 验证码
# TTL: 300秒（5分钟）

# =====================================================
# 缓存策略
# =====================================================

# 热点数据缓存:
# - 用户信息: 30分钟过期
# - 会话信息: 1小时过期
# - 群组成员: 5分钟过期

# 队列配置:
# - 消息队列长度: 100万条
# - 消费者数量: 100+
# - 批量处理: 100条/次

# 连接池配置说明:
# 100 连接池大小配置说明：
# - 每个WebSocket连接需要1个Redis连接
# - 100个连接可以支撑10万+并发连接
# - 配合分片锁，可以支撑百万级用户
