# =====================================================
# 壹信 IM 数据库配置文件
# =====================================================

database:
  # 数据库类型
  driver: postgres

  # PostgreSQL 连接配置
  host: localhost
  port: 5432
  username: postgres
  password: postgres
  dbname: im_db

  # 连接池配置（支持高并发）
  max_open_conns: 100      # 最大打开连接数
  max_idle_conns: 10       # 最大空闲连接数
  conn_max_lifetime: 3600  # 连接最大生命周期（秒）
  conn_max_idle_time: 600  # 空闲连接最大时间（秒）

  # SSL 配置
  sslmode: disable

  # 日志配置
  log_level: info          # debug, info, warn, error

# =====================================================
# 连接池说明
# =====================================================
#
# 100 最大连接数配置说明：
# - 每个请求处理大约需要 1-2 个数据库连接
# - 100 个连接可以支撑 50-100 个并发请求
# - 配合 Redis 缓存，可以支撑 10 万+ 用户
#
# 优化建议：
# - 如果需要支撑更高并发，可以增加连接数
# - 同时需要优化慢查询和添加索引
# - 考虑使用主从复制分散压力
