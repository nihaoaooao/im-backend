global:
  resolve_timeout: 5m

# 告警路由配置
route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default'
  routes:
    # 严重告警立即通知
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 0s
      repeat_interval: 1h

    # 警告告警延迟通知
    - match:
        severity: warning
      receiver: 'warning'
      group_wait: 30s

# 告警接收者配置
receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://im-backend:8080/api/v1/alerts'
        send_resolved: true

  - name: 'critical'
    webhook_configs:
      - url: 'http://im-backend:8080/api/v1/alerts/critical'
        send_resolved: true

  - name: 'warning'
    webhook_configs:
      - url: 'http://im-backend:8080/api/v1/alerts/warning'
        send_resolved: true

# 告警抑制规则
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'service']
