# Prometheus 配置
# 用于监控 IM 后端服务

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'im-backend'
    env: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - 'alerts.yml'

scrape_configs:
  # Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # IM 后端服务
  - job_name: 'im-backend'
    static_configs:
      - targets: ['im-backend:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # 告警规则
  - job_name: 'alerts'
    static_configs:
      - targets: []

# 告警规则配置
groups:
  - name: im-backend
    interval: 30s
    rules:
      # 高错误率告警
      - alert: HighErrorRate
        expr: rate(im_errors_total[5m]) > 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} errors/sec"

      # 高延迟告警
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected"
          description: "P95 latency is {{ $value }}s"

      # WebSocket 连接数告警
      - alert: HighConnections
        expr: im_websocket_connections > 50000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High WebSocket connections"
          description: "WebSocket connections: {{ $value }}"

      # 消息发送失败告警
      - alert: MessageSendFailure
        expr: rate(im_errors_total{type="message"}[5m]) > 5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Message send failures detected"
          description: "Message send error rate: {{ $value }}/sec"

      # 数据库连接池告警
      - alert: DBConnectionPoolExhausted
        expr: im_db_connections > 800
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "DB connections: {{ $value }}"

      # 内存使用告警
      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes > 2e9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage: {{ $value | humanize1024 }}B"

      # 用户登录异常
      - alert: LoginAnomaly
        expr: rate(im_user_logins_total[15m]) < 1
        for: 30m
        labels:
          severity: info
        annotations:
          summary: "Unusual login activity"
          description: "Login rate is unusually low"
