name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  NODE_VERSION: '18'
  GO_VERSION: '1.20'

jobs:
  # ========== 代码质量检查 ==========
  lint:
    name: 代码质量检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 后端代码检查
      - name: Backend Lint (Go)
        if: hashFiles('**/go.mod')
        run: |
          cd backend
          go vet ./...
          # 可以添加 golangci-lint

      - name: Backend Lint (Node.js)
        if: hashFiles('**/package.json')
        run: |
          cd backend
          npm ci
          npm run lint || true

      - name: Backend Lint (Java)
        if: hashFiles('**/pom.xml')
        run: |
          cd backend
          mvn checkstyle:check

      # 移动端代码检查
      - name: Mobile Lint (Android)
        if: hashFiles('**/build.gradle')
        run: |
          cd mobile/android
          ./gradlew lint

      - name: Mobile Lint (iOS)
        if: hashFiles('**/*.xcodeproj')
        run: |
          cd mobile/ios
          xcodebuild -workspace *.xcworkspace -scheme * -destination 'platform=iOS Simulator,name=iPhone 15' -quiet

      # 前端代码检查
      - name: Frontend Lint
        if: hashFiles('frontend/package.json')
        run: |
          cd frontend
          npm ci
          npm run lint

  # ========== 后端测试 ==========
  backend-test:
    name: 后端单元测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        if: hashFiles('**/go.mod')
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        if: hashFiles('**/package.json')
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Go Tests
        if: hashFiles('**/go.mod')
        run: |
          cd backend
          go test -v -race -coverprofile=coverage.out ./...

      - name: Node.js Tests
        if: hashFiles('**/package.json')
        run: |
          cd backend
          npm ci
          npm test -- --coverage

      - name: Upload coverage
        if: hashFiles('**/coverage.out') || hashFiles('**/coverage')
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.out
          fail_ci_if_error: false

  # ========== 移动端测试 ==========
  mobile-test:
    name: 移动端测试
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # Android 测试
      - name: Android Tests
        if: hashFiles('**/build.gradle')
        run: |
          cd mobile/android
          ./gradlew test

      # iOS 测试
      - name: iOS Tests
        if: hashFiles('**/*.xcodeproj')
        run: |
          cd mobile/ios
          xcodebuild test -workspace *.xcworkspace -scheme * -destination 'platform=iOS Simulator,name=iPhone 15'

  # ========== 前端测试 ==========
  frontend-test:
    name: 前端测试
    runs-on: ubuntu-latest
    if: hashFiles('frontend/package.json')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run tests
        run: |
          cd frontend
          npm test -- --coverage --watchAll=false

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          directory: ./frontend/coverage
          fail_ci_if_error: false

  # ========== 构建检查 ==========
  build:
    name: 构建检查
    runs-on: ubuntu-latest
    needs: [lint, backend-test, mobile-test, frontend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        if: hashFiles('**/go.mod')
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        if: hashFiles('**/package.json')
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Build Backend (Go)
        if: hashFiles('**/go.mod')
        run: |
          cd backend
          go build -o app .

      - name: Build Backend (Node.js)
        if: hashFiles('**/package.json')
        run: |
          cd backend
          npm run build

      - name: Build Android
        if: hashFiles('**/build.gradle')
        run: |
          cd mobile/android
          ./gradlew assembleDebug

      - name: Build Frontend
        if: hashFiles('frontend/package.json')
        run: |
          cd frontend
          npm run build
