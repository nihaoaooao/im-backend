name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  GO_VERSION: '1.21'
  NODE_VERSION: '18'

jobs:
  # ========== 代码质量检查 ==========
  lint:
    name: 代码质量检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 后端代码检查 (Go + Gin)
      - name: Setup Go
        if: hashFiles('**/go.mod')
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Go Lint (golangci-lint)
        if: hashFiles('**/go.mod')
        run: |
          cd backend
          golangci-lint run ./... || go vet ./...

      - name: Go FMT Check
        if: hashFiles('**/go.mod')
        run: |
          cd backend
          gofmt -l . | grep -q . && echo "Found unformatted files" && exit 1 || true

      # 移动端代码检查
      - name: Mobile Lint (Android)
        if: hashFiles('**/build.gradle')
        run: |
          cd mobile/android
          ./gradlew lint

      - name: Mobile Lint (iOS)
        if: hashFiles('**/*.xcodeproj')
        run: |
          cd mobile/ios
          xcodebuild -workspace *.xcworkspace -scheme * -destination 'platform=iOS Simulator,name=iPhone 15' -quiet

      # 前端代码检查
      - name: Frontend Lint
        if: hashFiles('frontend/package.json')
        run: |
          cd frontend
          npm ci
          npm run lint

  # ========== 后端测试 (Go + Gin) ==========
  backend-test:
    name: 后端测试
    runs-on: ubuntu-latest
    if: hashFiles('**/go.mod')
    services:
      # PostgreSQL 数据库服务
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Redis 缓存服务
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: |
          cd backend
          go mod download

      - name: Run Unit Tests
        run: |
          cd backend
          go test -v -race -coverprofile=coverage.out ./...

      - name: Run Integration Tests
        env:
          DATABASE_URL: postgres://testuser:testpass@localhost:5432/testdb?sslmode=disable
          REDIS_URL: redis://localhost:6379
        run: |
          cd backend
          go test -v -tags=integration ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.out
          fail_ci_if_error: false

  # ========== 移动端测试 ==========
  mobile-test:
    name: 移动端测试
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # Android 测试
      - name: Android Tests
        if: hashFiles('**/build.gradle')
        run: |
          cd mobile/android
          ./gradlew test

      # iOS 测试
      - name: iOS Tests
        if: hashFiles('**/*.xcodeproj')
        run: |
          cd mobile/ios
          xcodebuild test -workspace *.xcworkspace -scheme * -destination 'platform=iOS Simulator,name=iPhone 15'

  # ========== 前端测试 ==========
  frontend-test:
    name: 前端测试
    runs-on: ubuntu-latest
    if: hashFiles('frontend/package.json')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run tests
        run: |
          cd frontend
          npm test -- --coverage --watchAll=false

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          directory: ./frontend/coverage
          fail_ci_if_error: false

  # ========== 安全扫描 ==========
  security:
    name: 安全扫描
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Go 安全扫描
      - name: Go Vulnerability Scan
        if: hashFiles('**/go.mod')
        uses: golang/vuln-action@v1
        with:
          modules: github.com/your-module/backend

      - name: Go Sec Scan
        if: hashFiles('**/go.mod')
        run: |
          cd backend
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -fmt sonarqube -out gosec-report.json ./... || true

  # ========== 构建检查 ==========
  build:
    name: 构建检查
    runs-on: ubuntu-latest
    needs: [lint, backend-test, mobile-test, frontend-test, security]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        if: hashFiles('**/go.mod')
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build Backend (Go + Gin)
        if: hashFiles('**/go.mod')
        run: |
          cd backend
          go build -o bin/server .

      - name: Build Android
        if: hashFiles('**/build.gradle')
        run: |
          cd mobile/android
          ./gradlew assembleDebug

      - name: Build Frontend
        if: hashFiles('frontend/package.json')
        run: |
          cd frontend
          npm run build

      - name: Upload Build Artifacts
        if: hashFiles('**/go.mod')
        uses: actions/upload-artifact@v3
        with:
          name: backend-binary
          path: backend/bin/server
