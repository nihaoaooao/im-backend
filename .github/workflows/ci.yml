name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  GO_VERSION: '1.21'
  NODE_VERSION: '18'

jobs:
  # ========== 代码质量检查 ==========
  lint:
    name: 代码质量检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 后端代码检查 (Go + Gin)
      - name: Setup Go
        if: hashFiles('**/go.mod')
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Go Lint
        if: hashFiles('**/go.mod')
        run: |
          cd backend
          go vet ./... || true

      - name: Go FMT Check
        if: hashFiles('**/go.mod')
        run: |
          cd backend
          gofmt -l . || true

      # 移动端代码检查
      - name: Mobile Lint (Android)
        if: hashFiles('mobile/**/build.gradle')
        run: |
          cd mobile/android
          ./gradlew lint || true

      # 前端代码检查
      - name: Frontend Lint
        if: hashFiles('frontend/package.json')
        run: |
          cd frontend
          npm ci || true
          npm run lint || true

  # ========== 后端测试 (Go + Gin) ==========
  backend-test:
    name: 后端测试
    runs-on: ubuntu-latest
    if: hashFiles('**/go.mod')
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: |
          cd backend
          go mod download

      - name: Run Unit Tests
        run: |
          cd backend
          go test -v -race ./... || true

      - name: Run Integration Tests
        if: hashFiles('**/*_test.go')
        env:
          DATABASE_URL: postgres://testuser:testpass@localhost:5432/testdb?sslmode=disable
          REDIS_URL: redis://localhost:6379
        run: |
          cd backend
          go test -v -tags=integration ./... || true

  # ========== 移动端测试 ==========
  mobile-test:
    name: 移动端测试
    runs-on: macos-latest
    if: hashFiles('mobile/**/*')
    steps:
      - uses: actions/checkout@v4

      - name: Android Tests
        if: hashFiles('mobile/**/build.gradle')
        run: |
          cd mobile/android
          ./gradlew test || true

  # ========== 前端测试 ==========
  frontend-test:
    name: 前端测试
    runs-on: ubuntu-latest
    if: hashFiles('frontend/package.json')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run tests
        run: |
          cd frontend
          npm test -- --coverage --watchAll=false || true

  # ========== 安全扫描 ==========
  security:
    name: 安全扫描
    runs-on: ubuntu-latest
    if: hashFiles('**/go.mod')
    steps:
      - uses: actions/checkout@v4

      - name: Go Vulnerability Scan
        if: hashFiles('**/go.mod')
        uses: golang/vuln-action@v1
        with:
          modules: github.com/your-module/backend

  # ========== 构建检查 ==========
  build:
    name: 构建检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        if: hashFiles('**/go.mod')
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build Backend
        if: hashFiles('**/go.mod')
        run: |
          cd backend
          go build -o bin/server . || true

      - name: Build Android
        if: hashFiles('mobile/**/build.gradle')
        run: |
          cd mobile/android
          ./gradlew assembleDebug || true

      - name: Build Frontend
        if: hashFiles('frontend/package.json')
        run: |
          cd frontend
          npm run build || true
