<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title"}}IM 管理后台{{end}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body { background-color: #f3f4f6; }
        .sidebar { min-height: 100vh; }
        .sidebar a:hover, .sidebar a.active { background-color: #1e293b; }
        .card { border-radius: 0.5rem; }
        .table-action-btn { padding: 0.25rem 0.5rem; font-size: 0.75rem; }
    </style>
    {{block "extra_css"}}{{end}}
</head>
<body>
    <div class="flex">
        <!-- 侧边栏 -->
        <aside class="w-64 bg-slate-800 text-white flex-shrink-0">
            <div class="p-4 border-b border-slate-700">
                <h1 class="text-xl font-bold"><i class="bi bi-speedometer2 me-2"></i>IM 管理后台</h1>
            </div>
            <nav class="mt-2">
                <a href="/admin" class="block py-3 px-4 {% if .ActivePage == "dashboard" %}active bg-slate-700{% else %}text-slate-300{% endif %}">
                    <i class="bi bi-house-door me-2"></i>控制台
                </a>
                <a href="/admin/users" class="block py-3 px-4 {% if .ActivePage == "users" %}active bg-slate-700{% else %}text-slate-300{% endif %}">
                    <i class="bi bi-people me-2"></i>用户管理
                </a>
                <a href="/admin/groups" class="block py-3 px-4 {% if .ActivePage == "groups" %}active bg-slate-700{% else %}text-slate-300{% endif %}">
                    <i class="bi bi-collection me-2"></i>群组管理
                </a>
                <a href="/admin/messages" class="block py-3 px-4 {% if .ActivePage == "messages" %}active bg-slate-700{% else %}text-slate-300{% endif %}">
                    <i class="bi bi-chat-dots me-2"></i>消息管理
                </a>
                <a href="/admin/stats" class="block py-3 px-4 {% if .ActivePage == "stats" %}active bg-slate-700{% else %}text-slate-300{% endif %}">
                    <i class="bi bi-bar-chart me-2"></i>数据统计
                </a>
                <a href="/admin/settings" class="block py-3 px-4 {% if .ActivePage == "settings" %}active bg-slate-700{% else %}text-slate-300{% endif %}">
                    <i class="bi bi-gear me-2"></i>系统设置
                </a>
            </nav>
            <div class="absolute bottom-0 w-64 p-4 border-t border-slate-700">
                <a href="/admin/logout" class="block py-2 px-4 text-slate-300 hover:text-white">
                    <i class="bi bi-box-arrow-right me-2"></i>退出登录
                </a>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="flex-1 p-6">
            {{block "content"}}{{end}}
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {{block "extra_js"}}{{end}}
</body>
</html>
